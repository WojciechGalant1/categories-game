namespace:
  create: false

global:
  imagePullPolicy: Never

postgres:
  flyway:
    baselineOnMigrate: false

# Observability: metryki domyślnie off (brak Prometheus Operatora w dev), logi tekstowe.
# Actuator i tak działa na porcie 9090 (probes); włącz metrics.* by scrapować.

networkPolicy:
  enabled: false             # standardowy CNI minikube nie egzekwuje NetworkPolicy (wymaga --cni=calico)

ingress:
  host: pm.local
  tls:
    enabled: false           # lokalny dev na czystym HTTP, bez cert-manager
