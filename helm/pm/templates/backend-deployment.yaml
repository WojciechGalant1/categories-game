apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "pm.namespace" . }}
  labels:
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "pm.image" (dict "image" .Values.backend.image "registry" .Values.global.appImageRegistry) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.serverPort }}
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: {{ include "pm.postgres.secretUserKey" . }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: {{ include "pm.postgres.secretPasswordKey" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.jwt.secretName }}
                  key: JWT_SECRET
            {{- if .Values.redisHA.enabled }}
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisHA.auth.existingSecret }}
                  key: {{ .Values.redisHA.auth.existingSecretPasswordKey }}
            - name: SPRING_DATA_REDIS_SENTINEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisHA.auth.existingSecret }}
                  key: {{ .Values.redisHA.auth.existingSecretPasswordKey }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.serverPort }}
            initialDelaySeconds: 25
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.serverPort }}
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
