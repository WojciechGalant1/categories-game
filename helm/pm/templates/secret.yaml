{{- if .Values.postgres.credentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.credentialsSecret }}
  namespace: {{ include "pm.namespace" . }}
type: Opaque
data:
  username: {{ required "postgres.credentials.user is required when credentials.create=true" .Values.postgres.credentials.user | b64enc }}
  password: {{ required "postgres.credentials.password is required when credentials.create=true" .Values.postgres.credentials.password | b64enc }}
  POSTGRES_USER: {{ .Values.postgres.credentials.user | b64enc }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password | b64enc }}
  POSTGRES_DB: {{ .Values.postgres.credentials.database | b64enc }}
{{- end }}
