{{- if .Values.networkPolicy.enabled }}
# Default-deny: blokuje cały ruch Ingress i Egress w namespace.
# Poniższe polityki przywracają tylko niezbędne ścieżki (allow-list).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# DNS: wszystkie pody muszą rozwiązywać nazwy (kube-dns w kube-system).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Backend: ingress z kontrolera ingress; egress do bazy i Redis.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.serverPort }}
    {{- if or .Values.metrics.serviceMonitor.enabled .Values.metrics.annotations.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.managementPort }}
    {{- end }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.postgres.cnpg.clusterName }}
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
    {{- end }}
    {{- if .Values.redisHA.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    {{- end }}
---
# Frontend: ingress tylko z kontrolera ingress (egress DNS pokrywa allow-dns).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: 8080
{{- if eq .Values.postgres.mode "cnpg" }}
---
# CNPG: ingress od backendu, replikacja wewnątrz klastra oraz od operatora;
# egress wewnątrz klastra i do operatora (DNS pokrywa allow-dns).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-cnpg
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ .Values.postgres.cnpg.clusterName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.postgres.cnpg.clusterName }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.cnpgOperatorNamespace }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.postgres.cnpg.clusterName }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.cnpgOperatorNamespace }}
{{- end }}
{{- if .Values.redis.enabled }}
---
# Redis (dev, pojedynczy): ingress tylko od backendu.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
{{- end }}
{{- if .Values.redisHA.enabled }}
---
# Redis HA (Bitnami Sentinel): ingress od backendu i wewnątrz klastra (replikacja/sentinel);
# egress wewnątrz klastra.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ha
  namespace: {{ include "pm.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
{{- end }}
{{- end }}
