{{- if .Values.metrics.serviceMonitor.enabled }}
# Wymaga zainstalowanego Prometheus Operatora (CRD monitoring.coreos.com/v1).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend
  namespace: {{ include "pm.namespace" . }}
  labels:
    app: backend
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ include "pm.namespace" . }}
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: management
      path: /actuator/prometheus
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
