apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ include "pm.namespace" . }}
data:
  SERVER_PORT: {{ .Values.backend.serverPort | quote }}
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-0.postgres.{{ include "pm.namespace" . }}.svc.cluster.local:5432/{{ .Values.postgres.credentials.database }}"
