apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ include "pm.namespace" . }}
data:
  SERVER_PORT: {{ .Values.backend.serverPort | quote }}
  SPRING_DATASOURCE_URL: {{ include "pm.postgres.jdbcUrl" . | quote }}
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: {{ .Values.backend.hikari.maximumPoolSize | quote }}
  FLYWAY_BASELINE_ON_MIGRATE: {{ .Values.postgres.flyway.baselineOnMigrate | quote }}
  JWT_EXPIRY_HOURS: {{ .Values.backend.jwt.expiryHours | quote }}
  WS_SUBSCRIBE_TIMEOUT_SECONDS: {{ .Values.backend.ws.subscribeTimeoutSeconds | quote }}
  {{- if .Values.redisHA.enabled }}
  SPRING_DATA_REDIS_SENTINEL_MASTER: {{ .Values.redisHA.sentinel.masterSet | quote }}
  SPRING_DATA_REDIS_SENTINEL_NODES: "{{ .Values.redisHA.fullnameOverride }}:26379"
  APP_ROOM_TTL_LOBBY_SECONDS: {{ .Values.backend.roomTtl.lobbySeconds | quote }}
  APP_ROOM_TTL_IN_GAME_SECONDS: {{ .Values.backend.roomTtl.inGameSeconds | quote }}
  {{- else if .Values.redis.enabled }}
  SPRING_DATA_REDIS_HOST: {{ .Values.redis.host | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.redis.port | quote }}
  APP_ROOM_TTL_LOBBY_SECONDS: {{ .Values.backend.roomTtl.lobbySeconds | quote }}
  APP_ROOM_TTL_IN_GAME_SECONDS: {{ .Values.backend.roomTtl.inGameSeconds | quote }}
  {{- end }}
