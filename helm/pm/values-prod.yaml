global:
  imagePullPolicy: IfNotPresent
  appImageRegistry: ghcr.io/OWNER       # PODMIEŃ na ownera/organizację (obrazy aplikacji)
  imagePullSecrets:
    - ghcr-pull

backend:
  image:
    repository: pm-backend
    digest: "sha256:REPLACE_WITH_BACKEND_DIGEST"
  springProfile: prod          # aktywuje ProductionSecretsGuard (fail-fast na domyślnych sekretach)
  logging:
    structuredFormat: ecs      # strukturalne logi JSON (ECS) do zbierania przez kolektor
  cors:
    allowedOrigins: "https://pm.example.com"   # PODMIEŃ na właściwą domenę produkcyjną
  ws:
    allowedOrigins: "https://pm.example.com"   # PODMIEŃ na właściwą domenę produkcyjną

frontend:
  image:
    repository: pm-frontend
    digest: "sha256:REPLACE_WITH_FRONTEND_DIGEST"

redis:
  enabled: false               # prod używa HA (Bitnami Sentinel) zamiast pojedynczego Redisa

redisHA:
  enabled: true

metrics:
  serviceMonitor:
    enabled: true              # prod: scrape przez Prometheus Operator (ustaw labels pod swój release)

networkPolicy:
  enabled: true                # prod: egzekwuj default-deny + allow-list (wymaga CNI z obsługą NetworkPolicy)

ingress:
  host: pm.example.com         # PODMIEŃ na właściwą domenę produkcyjną
  tls:
    enabled: true
    secretName: pm-tls
    clusterIssuer: letsencrypt-prod
    sslRedirect: true

postgres:
  cnpg:
    primaryUpdateStrategy: supervised
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    backup:
      enabled: true
      destinationPath: s3://YOUR-BUCKET/pm-postgres/
      s3CredentialsSecret: pm-postgres-s3-credentials
