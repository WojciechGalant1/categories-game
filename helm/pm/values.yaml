namespace:
  name: pm-app
  create: true

global:
  imagePullPolicy: IfNotPresent
  appImageRegistry: ""     # np. ghcr.io/OWNER dla obrazów aplikacji (puste = lokalne, dev).
                           # Uwaga: NIE global.imageRegistry — ten klucz jest zarezerwowany przez subchart Bitnami.
  imagePullSecrets: []     # np. [ghcr-pull] (współdzielone z subchartami)

postgres:
  mode: cnpg
  image:
    repository: postgres
    tag: "16"
  storage: 2Gi
  storageClassName: standard
  credentialsSecret: postgres-credentials
  credentials:
    create: false
    user: pm
    database: pm
  flyway:
    baselineOnMigrate: false
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  cnpg:
    clusterName: pm-postgres
    instances: 3
    primaryUpdateStrategy: unsupervised
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    storage: 2Gi
    storageClassName: standard
    parameters:
      maxConnections: "200"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    backup:
      enabled: false
      pluginName: barman-cloud.cloudnative-pg.io
      objectStoreName: pm-postgres-store
      schedule: "0 0 2 * * *"
      destinationPath: ""
      s3CredentialsSecret: pm-postgres-s3-credentials

backend:
  image:
    repository: pm-backend
    tag: "3.2-auth"
    digest: ""             # np. sha256:...; ustawione => priorytet nad tag
  springProfile: ""        # "" = dev (defaulty OK); "prod" aktywuje fail-fast guard na sekretach
  replicas: 2
  serverPort: 3000
  managementPort: 9090     # Actuator (health/prometheus) na osobnym porcie, poza ingress
  logging:
    structuredFormat: ""   # "" = czytelny tekst (dev); "ecs" = strukturalne logi JSON (prod)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  service:
    port: 3000
  hikari:
    maximumPoolSize: 5
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  roomTtl:
    lobbySeconds: 180
    inGameSeconds: 600
  jwt:
    secretName: backend-secrets
    expiryHours: 24
  cors:
    allowedOrigins: "*"
  ws:
    subscribeTimeoutSeconds: 10
    allowedOrigins: "*"
  rateLimit:
    enabled: true
    capacity: 20
    refillPeriodSeconds: 60
  terminationGracePeriodSeconds: 40

frontend:
  image:
    repository: pm-frontend
    tag: "1.1-auth"
    digest: ""             # np. sha256:...; ustawione => priorytet nad tag
  replicas: 2
  service:
    port: 80
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

ingress:
  enabled: true
  className: nginx
  host: pm.local
  tls:
    enabled: false
    secretName: pm-tls
    clusterIssuer: ""      # np. letsencrypt-prod (wymaga zainstalowanego cert-manager)
    sslRedirect: true

redis:
  enabled: true
  image: redis:7-alpine
  host: redis
  port: 6379

# Redis HA (Bitnami subchart, Sentinel) — produkcja. Wzajemnie wykluczające się z redis.enabled.
redisHA:
  enabled: false
  fullnameOverride: pm-redis
  architecture: replication
  auth:
    enabled: true
    sentinel: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: redis-password
  commonConfiguration: |-
    appendonly yes
    save ""
    notify-keyspace-events Ex
  sentinel:
    enabled: true
    masterSet: mymaster
    quorum: 2
  replica:
    replicaCount: 3
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard
    pdb:
      create: true
      maxUnavailable: 1
  master:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpu:
    enabled: true
    averageUtilization: 70
  memory:
    enabled: false

# Pod Security Standards (etykiety PSA na namespace tworzonym przez chart).
# enforce=baseline jest bezpieczne dla CNPG i Bitnami Redis; restricted leci jako warn/audit.
podSecurity:
  enabled: true
  enforce: baseline
  warn: restricted
  audit: restricted

# Metryki Prometheus. Oba mechanizmy domyślnie off (dev). ServiceMonitor wymaga
# Prometheus Operatora; adnotacje działają z Prometheusem bez operatora.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}             # np. release: kube-prometheus-stack (selekcja przez Prometheusa)
  annotations:
    enabled: false

# PodDisruptionBudget warstwy aplikacji (CNPG/Redis HA mają własne).
pdb:
  enabled: true
  backend:
    maxUnavailable: 1
  frontend:
    maxUnavailable: 1

# NetworkPolicies (default-deny + allow-list). Domyślnie off — standardowy CNI
# minikube nie egzekwuje polityk (wymaga np. --cni=calico). Włącz w prod.
networkPolicy:
  enabled: false
  ingressNamespace: ingress-nginx      # etykieta kubernetes.io/metadata.name namespace kontrolera ingress
  cnpgOperatorNamespace: cnpg-system    # namespace operatora CloudNativePG
  monitoringNamespace: monitoring       # namespace Prometheusa (scrape portu management)
