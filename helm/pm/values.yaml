namespace:
  name: pm-app
  create: true

global:
  imagePullPolicy: IfNotPresent
  appImageRegistry: ""     # np. ghcr.io/OWNER dla obrazów aplikacji (puste = lokalne, dev).
                           # Uwaga: NIE global.imageRegistry — ten klucz jest zarezerwowany przez subchart Bitnami.
  imagePullSecrets: []     # np. [ghcr-pull] (współdzielone z subchartami)

postgres:
  mode: cnpg
  image:
    repository: postgres
    tag: "16"
  storage: 2Gi
  storageClassName: standard
  credentialsSecret: postgres-credentials
  credentials:
    create: false
    user: pm
    database: pm
  flyway:
    baselineOnMigrate: false
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  cnpg:
    clusterName: pm-postgres
    instances: 3
    primaryUpdateStrategy: unsupervised
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    storage: 2Gi
    storageClassName: standard
    parameters:
      maxConnections: "200"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    backup:
      enabled: false
      pluginName: barman-cloud.cloudnative-pg.io
      objectStoreName: pm-postgres-store
      schedule: "0 0 2 * * *"
      destinationPath: ""
      s3CredentialsSecret: pm-postgres-s3-credentials

backend:
  image:
    repository: pm-backend
    tag: "3.2-auth"
    digest: ""             # np. sha256:...; ustawione => priorytet nad tag
  replicas: 2
  serverPort: 3000
  service:
    port: 3000
  hikari:
    maximumPoolSize: 5
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  roomTtl:
    lobbySeconds: 180
    inGameSeconds: 600
  jwt:
    secretName: backend-secrets
    expiryHours: 24
  ws:
    subscribeTimeoutSeconds: 10

frontend:
  image:
    repository: pm-frontend
    tag: "1.1-auth"
    digest: ""             # np. sha256:...; ustawione => priorytet nad tag
  replicas: 2
  service:
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

ingress:
  enabled: true
  className: nginx
  host: pm.local
  tls:
    enabled: false
    secretName: pm-tls
    clusterIssuer: ""      # np. letsencrypt-prod (wymaga zainstalowanego cert-manager)
    sslRedirect: true

redis:
  enabled: true
  image: redis:7-alpine
  host: redis
  port: 6379

# Redis HA (Bitnami subchart, Sentinel) — produkcja. Wzajemnie wykluczające się z redis.enabled.
redisHA:
  enabled: false
  fullnameOverride: pm-redis
  architecture: replication
  auth:
    enabled: true
    sentinel: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: redis-password
  commonConfiguration: |-
    appendonly yes
    save ""
    notify-keyspace-events Ex
  sentinel:
    enabled: true
    masterSet: mymaster
    quorum: 2
  replica:
    replicaCount: 3
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard
    pdb:
      create: true
      maxUnavailable: 1
  master:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpu:
    enabled: true
    averageUtilization: 70
  memory:
    enabled: false
