# ClusterIssuer dla Let's Encrypt PRODUCTION.
# Używaj dopiero po udanym teście na staging - prod ma ostre rate-limity.
# Nazwa (letsencrypt-prod) musi zgadzać się z ingress.tls.clusterIssuer w values-prod.yaml.
# Wymaga zainstalowanego cert-manager w klastrze.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com           # PODMIEŃ na właściwy adres e-mail
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx     # składnia cert-manager >= 1.7
