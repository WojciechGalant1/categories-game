spring.application.name=backend
# Overridden in Kubernetes via the SERVER_PORT env var (relaxed binding -> server.port)
server.port=${SERVER_PORT:8080}

# PostgreSQL Configuration
# In Kubernetes these are overridden by SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

